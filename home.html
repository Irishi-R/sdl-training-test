<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563EB">
  <meta name="robots" content="noindex, nofollow">
  <title>Training Courses</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-header {
      background: var(--blue);
      padding: 28px 20px 22px;
    }
    .home-header h1 { color: #fff; font-size: 1.3rem; }
    .home-header p  { color: rgba(255,255,255,.75); font-size: .875rem; margin-top: 4px; }

    .catalog-body { padding: 6px 14px 32px; }

    .cat-section  { margin-bottom: 8px; }

    .cat-heading {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      padding: 16px 4px 8px;
    }

    .course-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .course-card:active { transform: scale(.98); }

    .course-info { flex: 1; min-width: 0; }
    .course-name {
      font-size: .9375rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .course-cat {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .go-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: .8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      pointer-events: none; /* card handles the tap */
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="screen-loading" class="screen">
    <div class="center-box">
      <div class="spinner"></div>
      <p class="muted small">Loading courses...</p>
    </div>
  </div>

  <!-- Error -->
  <div id="screen-error" class="screen hidden">
    <div class="card" style="text-align:center;padding-top:36px">
      <div class="icon-circle error">✕</div>
      <h2>Could not load courses</h2>
      <p id="error-message" class="muted small" style="margin-top:8px"></p>
    </div>
  </div>

  <!-- Catalog -->
  <div id="screen-catalog" class="screen hidden">
    <div class="home-header">
      <h1>Training Courses</h1>
      <p>Tap a course to get started</p>
    </div>
    <div class="catalog-body" id="catalog-body"></div>
  </div>

</div>

<script src="config.js"></script>
<script src="sheets.js"></script>
<script>
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + name).classList.remove('hidden');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  async function init() {
    try {
      const result = await SheetsAPI.getAllCourses();
      if (!result.success) throw new Error(result.error);
      render(result.courses);
      showScreen('catalog');
    } catch (e) {
      document.getElementById('error-message').textContent =
        'Could not load courses. Please check your internet and try again.';
      showScreen('error');
    }
  }

  function render(courses) {
    const grouped = {};
    courses.forEach(c => {
      if (!grouped[c.category]) grouped[c.category] = [];
      grouped[c.category].push(c);
    });

    const body = document.getElementById('catalog-body');
    body.innerHTML = '';

    Object.entries(grouped).forEach(([category, items]) => {
      const section = document.createElement('div');
      section.className = 'cat-section';
      section.innerHTML = `<div class="cat-heading">${esc(category)}</div>`;

      items.forEach(course => {
        const a = document.createElement('a');
        a.className = 'course-card';
        a.href = `index.html?course=${encodeURIComponent(course.id)}`;
        a.innerHTML = `
          <div class="course-info">
            <div class="course-name">${esc(course.name)}</div>
            <div class="course-cat">${esc(category)}</div>
          </div>
          <button class="go-btn">Start →</button>`;
        section.appendChild(a);
      });

      body.appendChild(section);
    });
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
